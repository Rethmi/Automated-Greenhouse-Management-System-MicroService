server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: zone-service
          uri: lb://ZONE-SERVICE
          predicates:
            - Path=/api/zones/**
          filters:
            - AuthenticationFilter
        - id: sensor-service
          uri: lb://SENSOR-SERVICE
          predicates:
            - Path=/api/sensors/**
          filters:
            - AuthenticationFilter
        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/automation/**
          filters:
            - AuthenticationFilter
        - id: crop-service
          uri: lb://CROP-SERVICE
          predicates:
            - Path=/api/crops/**
          filters:
            - AuthenticationFilter
        - id: external-auth-service
          uri: http://104.211.95.241:8080
          predicates:
            - Path=/auth/**

app:
  jwt:
    secret: "4A614E645267556A586E3272357538782F413F4428472B4B6250655368566D59"

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
